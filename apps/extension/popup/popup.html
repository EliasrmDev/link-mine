<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkMine</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">

    <!-- ── Header ── -->
    <header class="header">
      <span class="logo">LinkMine</span>
      <div class="header-actions">
        <button id="btn-theme" class="icon-btn" aria-label="Toggle dark mode" title="Toggle dark mode">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
        </button>
        <!-- Logout — hidden until user is authenticated (controlled by popup.js) -->
        <button id="btn-logout" class="icon-btn icon-btn--danger" aria-label="Sign out" title="Sign out" hidden>
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </div>
    </header>

    <!-- ── Not authenticated ── -->
    <section id="view-auth" class="view" hidden aria-label="Sign in">
      <div class="auth-container">
        <p class="auth-desc">Sign in to save and sync your bookmarks.</p>
        <button id="btn-login" class="btn btn-primary btn-block">
          Sign in with Google
        </button>
        <p class="auth-hint">Your bookmarks will sync across all devices.</p>
      </div>
    </section>

    <!-- ── Authenticated ── -->
    <section id="view-main" class="view" hidden aria-label="Save bookmark">

      <!-- Reminder banner (shown when reminders are due) -->
      <div id="reminder-banner" class="reminder-banner" hidden role="alert" aria-live="polite" style="display: none;">
        <span class="reminder-icon" aria-hidden="true">⏰</span>
        <span id="reminder-text" class="reminder-text"></span>
        <a id="reminder-link" href="#" target="_blank" rel="noopener noreferrer" class="reminder-link">
          View →
        </a>
      </div>

      <!-- Quick save shortcut banner -->
      <div id="shortcut-banner" class="shortcut-banner">
        <span class="shortcut-icon" aria-hidden="true">⚡</span>
        <span class="shortcut-text">Quick save: <kbd>Ctrl+Shift+S</kbd></span>
      </div>

      <!-- Current page -->
      <div class="current-page card" id="current-page-card">
        <div class="page-info">
          <img id="page-favicon" src="" alt="" width="16" height="16" class="favicon" />
          <div class="page-text">
            <p id="page-url" class="page-url" title=""></p>
          </div>
        </div>

        <div class="field">
          <label for="page-title-input" class="label">Path name</label>
          <input id="page-title-input" class="text-input" type="text" maxlength="500" autocomplete="off" />
        </div>

        <div class="field">
          <label class="label">Icon</label>
          <div class="icon-picker" id="page-icon-picker">
            <div class="icon-preview" id="page-icon-preview" aria-live="polite">
              <img id="page-icon-favicon" src="" alt="" width="16" height="16" class="favicon" />
              <span id="page-icon-value" class="icon-value" hidden></span>
            </div>
            <button id="btn-edit-icon" type="button" class="icon-btn" aria-label="Edit icon" title="Edit icon">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
              </svg>
            </button>
          </div>
          <div id="page-icon-editor" class="icon-editor" hidden>
            <div id="page-icon-presets" class="icon-presets" role="listbox" aria-label="Preset icons"></div>
            <div class="icon-editor-row">
              <input id="page-icon-input" class="text-input icon-input" type="text" maxlength="10" placeholder="custom" autocomplete="off" aria-label="Custom icon" />
              <button id="btn-clear-icon" type="button" class="btn-mini">Reset</button>
              <button id="btn-close-icon" type="button" class="btn-mini">Done</button>
            </div>
          </div>
        </div>

        <!-- Folder selector -->
        <div class="field">
          <label class="label">Tags</label>
          <div id="page-tag-presets" class="tag-presets" role="listbox" aria-label="Preset tags"></div>
          <input
            id="page-tags-input"
            class="text-input"
            type="text"
            maxlength="250"
            placeholder="work, tools, reading"
            autocomplete="off"
            aria-label="Bookmark tags"
          />
        </div>

        <!-- Folder selector -->
        <div class="field">
          <label for="folder-select" class="label">Save to folder</label>
          <select id="folder-select" class="select">
            <option value="">No folder</option>
          </select>
        </div>

        <!-- Reminder -->
        <div class="field">
          <label for="page-reminder-input" class="label">Reminder (optional)</label>
          <input
            id="page-reminder-input"
            class="text-input"
            type="date"
            aria-label="Set reminder date"
            title="Set a reminder for this bookmark"
          />
        </div>

        <!-- Actions -->
        <div class="actions">
          <button id="btn-save" class="btn btn-primary btn-block">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
            </svg>
            Save this page
          </button>
        </div>

        <!-- Status message -->
        <div id="save-status" class="status" role="status" aria-live="polite" hidden></div>
      </div>

      <!-- Recent bookmarks -->
      <div class="recent">
        <div class="recent-header">
          <span class="section-label">Recent</span>
          <a id="link-dashboard" href="#" target="_blank" rel="noopener noreferrer" class="link-sm">
            Open dashboard →
          </a>
        </div>
        <div class="search-row">
          <input
            id="recent-search"
            type="search"
            class="search-input"
            placeholder="Search bookmarks…"
            aria-label="Search bookmarks"
            autocomplete="off"
          />
        </div>
        <ul id="recent-list" class="recent-list" role="list" aria-label="Recent bookmarks">
          <li class="loading-item" aria-busy="true">Loading…</li>
        </ul>
      </div>
    </section>

    <!-- ── Loading screen ── -->
    <section id="view-loading" class="view loading-screen" aria-label="Loading">
      <div class="spinner" aria-hidden="true"></div>
      <p>Loading…</p>
    </section>

  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
